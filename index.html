<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supernatural Intelligence Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { margin: 0; height: 100%; background: #060a12; color: white; font-family: Arial, sans-serif; }
    #map { height: 100vh; width: 100vw; }
    .leaflet-popup-content { font-size: 13px; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map("map").setView([39, -98], 4);

    L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
      {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap & CARTO"
      }
    ).addTo(map);

    function hexStyle(hex) {
      let color = "#39ff88";
      if (hex.dominant === "ufo") color = "#47b8ff";
      if (hex.dominant === "haunted" || hex.dominant === "haunted_place") color = "#c56bff";

      const opacity = Math.max(0.2, Math.min(0.8, (hex.total || 1) / 20));

      return {
        color,
        weight: 1,
        opacity: 1,
        fillColor: color,
        fillOpacity: opacity
      };
    }

    fetch("./supernatural_intel_v17.json")
      .then((r) => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then((data) => {
        if (!data.hexes || !Array.isArray(data.hexes)) {
          throw new Error("JSON loaded, but no hexes array was found.");
        }

        const layers = [];

        data.hexes.forEach((hex) => {
          if (!hex.polygon || !Array.isArray(hex.polygon)) return;

          const layer = L.polygon(hex.polygon, hexStyle(hex))
            .bindPopup(`
              <strong>${hex.id || "Hex Cell"}</strong><br>
              Total: ${hex.total ?? 0}<br>
              Bigfoot: ${hex.bigfoot ?? 0}<br>
              UFO: ${hex.ufo ?? 0}<br>
              Haunted: ${hex.haunted ?? 0}<br>
              Top State: ${hex.top_state || "Unknown"}<br>
              Top Year: ${hex.top_year || "Unknown"}
            `)
            .addTo(map);

          layers.push(layer);
        });

        if (layers.length) {
          const group = L.featureGroup(layers);
          map.fitBounds(group.getBounds().pad(0.2));
        } else {
          console.error("JSON loaded but no polygon layers were added.");
        }
      })
      .catch((err) => {
        console.error("Map load failed:", err);
        alert("Map load failed. Open browser dev tools Console to see the error.");
      });
  </script>
</body>
</html>
