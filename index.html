<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Supernatural Intelligence Dash</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
background:#070c16;
color:white;
font-family:Arial;
}

#map{
height:100vh;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([39,-98],4)

L.tileLayer(
"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
{attribution:"©OpenStreetMap"}
).addTo(map)

fetch("supernatural_intel_v17.json")
.then(r=>r.json())
.then(data=>{

data.forEach(d=>{

L.circleMarker(
[d.lat,d.lng],
{
radius:4,
color:"#39ff88"
})
.addTo(map)

})

})

</script>

</body>
</html>
